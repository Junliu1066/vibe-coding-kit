<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#161029"/>
      <stop offset="1" stop-color="#241640"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8fb3"/>
      <stop offset="1" stop-color="#ff5c8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff5c8a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff5c8a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="1050" cy="120" rx="420" ry="320" fill="url(#glow)"/>

  <!-- top label -->
  <g transform="translate(80,78)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#pink)"/>
    <text x="28" y="13" fill="#c9d1d9" font-size="22" font-weight="600" letter-spacing="3">VIBE-CODING-KIT</text>
  </g>

  <!-- killer line -->
  <text x="80" y="250" fill="#ffffff" font-size="92" font-weight="800" letter-spacing="1">需求没说清，</text>
  <text x="80" y="362" fill="#ffffff" font-size="92" font-weight="800" letter-spacing="1">等于<tspan fill="url(#pink)">没说</tspan>。</text>

  <!-- sub line -->
  <text x="84" y="438" fill="#aab2c0" font-size="32" font-weight="400">AI 不会卡住——它会朝着错误的方向，自信地，把你的项目实现出来。</text>

  <!-- divider -->
  <rect x="84" y="486" width="1112" height="1" fill="#2a2f3a"/>

  <!-- tagline -->
  <text x="84" y="544" fill="#e6edf3" font-size="30" font-weight="600">不教你写代码，教你把"用 AI 写代码"这件事，彻底想明白。</text>

  <!-- skill chips -->
  <g transform="translate(84,576)" font-size="22" font-weight="600">
    <g><rect x="0" y="0" width="120" height="40" rx="20" fill="#1f2733"/><text x="60" y="26" fill="#8fd3ff" text-anchor="middle">需求</text></g>
    <g transform="translate(136,0)"><rect width="120" height="40" rx="20" fill="#1f2733"/><text x="60" y="26" fill="#b39dff" text-anchor="middle">架构</text></g>
    <g transform="translate(272,0)"><rect width="120" height="40" rx="20" fill="#1f2733"/><text x="60" y="26" fill="#7ee2a8" text-anchor="middle">上线</text></g>
    <g transform="translate(408,0)"><rect width="120" height="40" rx="20" fill="#1f2733"/><text x="60" y="26" fill="#ffb38f" text-anchor="middle">避坑自救</text></g>
    <g transform="translate(572,0)"><rect width="160" height="40" rx="20" fill="#2a1a24"/><text x="80" y="26" fill="#ff8fb3" text-anchor="middle">访谈式 PRD</text></g>
  </g>
</svg>
