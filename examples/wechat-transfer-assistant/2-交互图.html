<!--
  ★ AI 开发注意 ★
  本文件是 PRD「UI/交互说明」和「设计 Token」的视觉实现。
  - 所有色值/字号/圆角/阴影 来自 PRD §设计 Token
  - 所有 UI 元素对应 PRD §整体布局 7 层结构
  - 所有状态（空态/加载态/错误态/编辑态/移动端）对应 PRD §状态设计
  - API 映射：上传→POST /api/upload，列表→GET /api/records，添加→POST /api/records
              编辑→PUT /api/records/:id，删除→DELETE /api/records/:id，导出→GET /api/export
  - 前端实现必须保留本文件所有 CSS 变量/组件结构和交互行为
  - 演示数据为示例，正式开发时替换为真实 API 调用
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信转账对账助手 - 高保真交互原型</title>
<style>
  :root {
    --primary: #7c3aed;
    --primary-hover: #6d28d9;
    --danger: #ef4444;
    --bg: #f5f6fa;
    --card-bg: #ffffff;
    --border: #d1d5db;
    --text-primary: #2d3436;
    --text-secondary: #636e72;
    --success: #00b894;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text-primary); }
  .container { max-width: 960px; margin: 0 auto; padding: 20px; }
  .header { text-align: center; padding: 40px 20px 30px; }
  .header h1 { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
  .header p { color: var(--text-secondary); font-size: 14px; }
  .header .badge { display: inline-block; margin-top: 10px; padding: 4px 14px; background: #dfe6e9; border-radius: 12px; font-size: 12px; color: var(--text-secondary); }

  /* 上传区域 */
  .upload-area { background: var(--card-bg); border: 2px dashed var(--border); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all .3s; margin-bottom: 24px; }
  .upload-area:hover { border-color: var(--primary); background: #f5f3ff; }
  .upload-area.uploading { border-color: var(--primary); pointer-events: none; }
  .upload-area.error { border-color: var(--danger); background: #fef2f2; }
  .upload-area.success { border-color: var(--success); }
  .upload-area .icon { font-size: 40px; margin-bottom: 12px; }
  .upload-area .text { font-size: 16px; color: var(--text-primary); font-weight: 500; }
  .upload-area .sub { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
  .upload-area .hint { font-size: 12px; color: #b2bec3; margin-top: 12px; }
  .upload-area .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }
  .upload-area.error .error-msg { display: block; }
  /* 进度环 */
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #dfe6e9; border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 演示横幅 */
  .demo-banner { background: #ffeaa7; color: var(--text-primary); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .demo-banner strong { font-weight: 600; }

  /* 空态 */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); display: none; }
  .empty-state.show { display: block; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state .text { font-size: 15px; color: var(--text-secondary); }
  .empty-state .hint { font-size: 13px; color: #b2bec3; margin-top: 8px; }

  /* 统计卡片 */
  .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: var(--card-bg); border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; box-shadow: var(--shadow); }
  .stat-card .num { font-size: 26px; font-weight: 700; color: var(--text-primary); }
  .stat-card .label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .stat-card .num.green { color: var(--success); }
  .stat-card .num.red { color: #e17055; }

  /* Tab */
  .tabs { display: flex; gap: 0; margin-bottom: 0; background: var(--card-bg); border-radius: 12px 12px 0 0; overflow: hidden; box-shadow: var(--shadow); }
  .tabs button { flex: 1; padding: 14px 20px; border: none; background: var(--card-bg); font-size: 15px; font-weight: 500; cursor: pointer; transition: all .3s; border-bottom: 3px solid transparent; color: var(--text-secondary); }
  .tabs button.active { color: var(--primary); border-bottom-color: var(--primary); background: #f5f3ff; }
  .tabs button:hover:not(.active) { background: #f5f6fa; }

  /* 表格区 */
  .tab-content { background: var(--card-bg); border-radius: 0 0 12px 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 20px; display: none; }
  .tab-content.active { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #f8f9fa; padding: 12px 14px; text-align: left; font-weight: 600; color: var(--text-primary); border-bottom: 2px solid #dfe6e9; font-size: 13px; }
  td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; height: 48px; }
  tr:hover td { background: #f5f3ff; }
  .amount { font-weight: 600; font-variant-numeric: tabular-nums; }
  .empty-row td { text-align: center; color: #b2bec3; padding: 40px 14px; }

  /* 按钮 */
  .actions { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .3s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-secondary { background: #dfe6e9; color: var(--text-primary); }
  .btn-secondary:hover { background: #b2bec3; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #00a381; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-sm { padding: 4px 12px; font-size: 12px; }
  .btn:disabled { opacity: .6; cursor: not-allowed; }

  /* 编辑/添加弹窗 */
  .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,.4); z-index: 1000; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--card-bg); border-radius: 16px; padding: 24px; max-width: 480px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
  .modal h3 { margin-bottom: 16px; font-size: 16px; }
  .modal .form-group { margin-bottom: 12px; }
  .modal .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text-secondary); }
  .modal .form-group input, .modal .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 14px; }
  .modal .form-group input:focus, .modal .form-group select:focus { outline: none; border-color: var(--primary); }
  .modal .form-group input.error { border-color: var(--danger); }
  .modal .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  /* 确认弹窗 */
  .confirm-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,.4); z-index: 1001; justify-content: center; align-items: center; }
  .confirm-overlay.active { display: flex; }
  .confirm-box { background: var(--card-bg); border-radius: 16px; padding: 24px; max-width: 360px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,.2); text-align: center; }
  .confirm-box p { font-size: 15px; color: var(--text-primary); margin-bottom: 20px; }
  .confirm-box .form-actions { display: flex; gap: 10px; justify-content: center; }

  /* Toast */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--text-primary); color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 2000; opacity: 0; transition: opacity .4s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* 错误横幅 */
  .error-banner { background: #fef2f2; border: 1px solid var(--danger); color: var(--danger); border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; font-size: 13px; display: none; }
  .error-banner.show { display: block; }

  /* 移动端 */
  @media (max-width: 768px) {
    .header h1 { font-size: 22px; }
    .stats { flex-direction: column; }
    .stat-card { min-width: auto; }
    .actions { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
    .modal { max-width: 90vw; }
    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 微信转账对账助手</h1>
    <p>上传聊天截图 → 自动识别入金/出金 → 导出 Excel</p>
    <div class="badge">高保真交互原型（演示数据为示例）</div>
  </div>

  <!-- 上传区域 -->
  <div class="upload-area" id="uploadArea" onclick="simulateUpload()">
    <div class="icon">📁</div>
    <div class="text">点击上传聊天截图</div>
    <div class="sub">支持 PNG、JPG 格式</div>
    <div class="hint">已模拟上传示例数据，点此重新加载</div>
    <div class="error-msg">识别失败，请重试</div>
  </div>

  <!-- 网络错误横幅 -->
  <div class="error-banner" id="errorBanner">⚠️ 网络连接异常，请检查后重试</div>

  <!-- 空态 -->
  <div class="empty-state show" id="emptyState">
    <div class="icon">📋</div>
    <div class="text">上传一张截图开始对账</div>
    <div class="hint">支持微信聊天截图（PNG / JPG），单张不超过 10MB</div>
  </div>

  <!-- 演示横幅 -->
  <div class="demo-banner" id="demoBanner" style="display:none">💡 <strong>演示模式</strong> — 以下数据为模拟的识别结果，用于展示产品功能和交互流程。</div>

  <!-- 统计卡片 -->
  <div class="stats" id="statsRow" style="display:none">
    <div class="stat-card"><div class="num green" id="totalInAmount">¥0</div><div class="label">入金总计</div></div>
    <div class="stat-card"><div class="num red" id="totalOutAmount">¥0</div><div class="label">出金总计</div></div>
    <div class="stat-card"><div class="num" id="totalCount">0</div><div class="label">总记录数</div></div>
    <div class="stat-card"><div class="num" id="dedupCount">0</div><div class="label">去重过滤</div></div>
  </div>

  <!-- Tab -->
  <div class="tabs" id="tabsRow" style="display:none">
    <button class="active" onclick="switchTab('in')">📥 入金表</button>
    <button onclick="switchTab('out')">📤 出金表</button>
  </div>

  <!-- 入金表 -->
  <div class="tab-content active" id="tab-in" style="display:none">
    <div class="actions">
      <button class="btn btn-secondary" onclick="addRow('in')">＋ 手动添加</button>
      <button class="btn btn-success" id="exportBtn" onclick="exportExcel()">📥 导出 Excel</button>
    </div>
    <div class="table-wrapper"><table><thead><tr><th>时间</th><th>交易方</th><th>金额</th><th>备注</th><th>操作</th></tr></thead><tbody id="inTableBody"></tbody></table></div>
  </div>

  <!-- 出金表 -->
  <div class="tab-content" id="tab-out" style="display:none">
    <div class="actions">
      <button class="btn btn-secondary" onclick="addRow('out')">＋ 手动添加</button>
      <button class="btn btn-success" onclick="exportExcel()">📥 导出 Excel</button>
    </div>
    <div class="table-wrapper"><table><thead><tr><th>时间</th><th>交易方</th><th>金额</th><th>备注</th><th>操作</th></tr></thead><tbody id="outTableBody"></tbody></table></div>
  </div>

  <div style="text-align:center;padding:10px 0 30px;color:#b2bec3;font-size:12px;">高保真交互原型 · 演示数据为示例</div>
</div>

<!-- 编辑/添加弹窗 -->
<div class="modal-overlay" id="editModal"><div class="modal">
  <h3 id="modalTitle">编辑记录</h3>
  <div class="form-group"><label>时间</label><input type="text" id="editTime" placeholder="YYYY-MM-DD HH:MM"></div>
  <div class="form-group"><label>交易方</label><input type="text" id="editParty" placeholder="请输入交易方"></div>
  <div class="form-group"><label>方向</label><select id="editDirection"><option value="入金">入金</option><option value="出金">出金</option></select></div>
  <div class="form-group"><label>金额 (¥)</label><input type="text" id="editAmount" placeholder="请输入金额"></div>
  <div class="form-group"><label>备注</label><input type="text" id="editNote" placeholder="选填"></div>
  <div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveEdit()">保存</button></div>
</div></div>

<!-- 删除确认弹窗 -->
<div class="confirm-overlay" id="confirmModal"><div class="confirm-box">
  <p>确定删除此记录？</p>
  <div class="form-actions"><button class="btn btn-secondary" onclick="closeConfirm()">取消</button><button class="btn btn-danger" id="confirmDeleteBtn">确定</button></div>
</div></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let data = { in: [], out: [] };
  let editId = null;
  let editType = null;
  let pendingDelete = null;

  function loadDemoData() {
    data = {
      in: [
        { id: 'i1', time: '2026-06-01 14:30', party: '张三', amount: 200, note: '货款' },
        { id: 'i2', time: '2026-06-03 09:15', party: '李四', amount: 580, note: '' },
        { id: 'i3', time: '2026-06-08 20:00', party: '王五', amount: 1200, note: '房租' },
        { id: 'i4', time: '2026-06-15 11:45', party: '赵六', amount: 800, note: '' },
        { id: 'i5', time: '2026-06-22 16:30', party: '陈七', amount: 900, note: '项目款' }
      ],
      out: [
        { id: 'o1', time: '2026-06-05 10:00', party: '供应商A', amount: 450, note: '物料采购' },
        { id: 'o2', time: '2026-06-12 15:20', party: '快递公司', amount: 360, note: '运费' },
        { id: 'o3', time: '2026-06-20 08:50', party: '物业', amount: 450, note: '电费' }
      ]
    };
    showDataView();
    renderAll();
    showToast('✅ 已识别 8 条转账记录（入金 5 条 / 出金 3 条），0 条重复已过滤');
  }

  function showDataView() {
    document.getElementById('emptyState').classList.remove('show');
    document.getElementById('demoBanner').style.display = 'flex';
    document.getElementById('statsRow').style.display = 'flex';
    document.getElementById('tabsRow').style.display = 'flex';
    document.getElementById('tab-in').style.display = 'block';
    document.getElementById('tab-out').style.display = 'none';
    document.querySelectorAll('.tabs button')[0].classList.add('active');
    document.querySelectorAll('.tabs button')[1].classList.remove('active');
  }

  function showEmptyState() {
    data = { in: [], out: [] };
    document.getElementById('emptyState').classList.add('show');
    document.getElementById('demoBanner').style.display = 'none';
    document.getElementById('statsRow').style.display = 'none';
    document.getElementById('tabsRow').style.display = 'none';
    document.getElementById('tab-in').style.display = 'none';
    document.getElementById('tab-out').style.display = 'none';
  }

  function renderTable(type) {
    const tbody = document.getElementById(type === 'in' ? 'inTableBody' : 'outTableBody');
    const items = data[type];
    if (items.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">暂无记录</td></tr>';
    } else {
      tbody.innerHTML = items.map(item => `
        <tr>
          <td>${item.time}</td>
          <td>${item.party || '——'}</td>
          <td class="amount">¥${item.amount.toFixed(2)}</td>
          <td>${item.note || '-'}</td>
          <td><button class="btn btn-secondary btn-sm" onclick="editRow('${type}','${item.id}')">✏️</button> <button class="btn btn-secondary btn-sm" style="background:#fce4ec;color:var(--danger);" onclick="deleteRow('${type}','${item.id}')">🗑</button></td>
        </tr>
      `).join('');
    }
    updateStats();
  }

  function renderAll() { renderTable('in'); renderTable('out'); }

  function updateStats() {
    const inTotal = data.in.reduce((s, r) => s + r.amount, 0);
    const outTotal = data.out.reduce((s, r) => s + r.amount, 0);
    document.getElementById('totalInAmount').textContent = '¥' + inTotal.toLocaleString();
    document.getElementById('totalOutAmount').textContent = '¥' + outTotal.toLocaleString();
    document.getElementById('totalCount').textContent = data.in.length + data.out.length;
  }

  function switchTab(tab) {
    document.querySelectorAll('.tabs button').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='in')||(i===1&&tab==='out')));
    document.getElementById('tab-in').classList.toggle('active', tab === 'in');
    document.getElementById('tab-out').classList.toggle('active', tab === 'out');
  }

  function editRow(type, id) {
    const item = data[type].find(r => r.id === id);
    if (!item) return;
    editType = type; editId = id;
    document.getElementById('editTime').value = item.time;
    document.getElementById('editParty').value = item.party;
    document.getElementById('editDirection').value = type === 'in' ? '入金' : '出金';
    document.getElementById('editAmount').value = item.amount;
    document.getElementById('editNote').value = item.note || '';
    document.getElementById('modalTitle').textContent = '编辑记录';
    document.getElementById('editModal').classList.add('active');
  }

  function addRow(type) {
    editType = type; editId = null;
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('editTime').value = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
    document.getElementById('editParty').value = '';
    document.getElementById('editDirection').value = type === 'in' ? '入金' : '出金';
    document.getElementById('editAmount').value = '';
    document.getElementById('editNote').value = '';
    document.getElementById('modalTitle').textContent = '手动添加记录';
    document.getElementById('editModal').classList.add('active');
  }

  function saveEdit() {
    const time = document.getElementById('editTime').value.trim();
    const party = document.getElementById('editParty').value.trim();
    const dir = document.getElementById('editDirection').value;
    const amount = parseFloat(document.getElementById('editAmount').value);
    const note = document.getElementById('editNote').value.trim();
    if (!time || !party || isNaN(amount)) { showToast('⚠️ 请填写完整信息（时间、交易方、金额）'); return; }
    const type = dir === '入金' ? 'in' : 'out';
    if (editId) {
      const item = data[editType].find(r => r.id === editId);
      if (item) { item.time = time; item.party = party; item.amount = amount; item.note = note; }
      if (editType !== type) {
        data[editType] = data[editType].filter(r => r.id !== editId);
        data[type].push({ id: editId, time, party, amount, note });
      }
      showToast('✅ 已保存');
    } else {
      const newId = type + '-' + Date.now();
      data[type].push({ id: newId, time, party, amount, note });
      showToast('✅ 已添加');
    }
    closeModal();
    renderAll();
  }

  function deleteRow(type, id) {
    pendingDelete = { type, id };
    document.getElementById('confirmModal').classList.add('active');
  }

  function closeConfirm() {
    document.getElementById('confirmModal').classList.remove('active');
    pendingDelete = null;
  }

  document.getElementById('confirmDeleteBtn').onclick = function() {
    if (!pendingDelete) return;
    const { type, id } = pendingDelete;
    data[type] = data[type].filter(r => r.id !== id);
    renderAll();
    showToast('🗑 已删除');
    // 如果全部删完，回到空态
    if (data.in.length === 0 && data.out.length === 0) {
      showEmptyState();
    }
    closeConfirm();
  };

  function closeModal() { document.getElementById('editModal').classList.remove('active'); editId = null; }

  function exportExcel() {
    const btn = document.getElementById('exportBtn');
    btn.textContent = '导出中...';
    btn.disabled = true;
    setTimeout(() => {
      btn.textContent = '📥 导出 Excel';
      btn.disabled = false;
      showToast('📥 已导出 Excel 文件（入金 ' + data.in.length + ' 条 / 出金 ' + data.out.length + ' 条）');
    }, 800);
  }

  function simulateUpload() {
    const area = document.getElementById('uploadArea');
    // 加载态
    area.classList.add('uploading');
    area.classList.remove('error', 'success');
    area.innerHTML = '<div class="spinner"></div><div class="text">正在识别...</div><div class="sub">调用百度云 OCR 解析截图</div>';
    setTimeout(() => {
      // 模拟成功
      loadDemoData();
      area.classList.remove('uploading');
      area.classList.add('success');
      area.innerHTML = '<div class="icon" style="font-size:30px;">✅</div><div class="text">识别完成</div><div class="sub">上次识别：' + new Date().toLocaleString() + '</div><div class="hint">点此重新上传截图</div>';
    }, 1500);
  }

  // 模拟错误态（演示用：双击上传区域触发）
  let clickCount = 0;
  document.getElementById('uploadArea').addEventListener('dblclick', function() {
    clickCount++;
    if (clickCount % 2 === 0) { // 偶数次双击触发错误态演示
      const area = document.getElementById('uploadArea');
      area.classList.add('error');
      area.innerHTML = '<div class="icon" style="font-size:30px;">❌</div><div class="text">识别失败，请重试</div><div class="sub">请检查截图是否清晰</div><div class="error-msg">识别失败，请重试</div><div class="hint">点此重新上传截图</div>';
      document.getElementById('errorBanner').classList.add('show');
      setTimeout(() => {
        area.classList.remove('error');
        area.innerHTML = '<div class="icon">📁</div><div class="text">点击上传聊天截图</div><div class="sub">支持 PNG、JPG 格式</div><div class="hint">已模拟上传示例数据，点此重新加载</div><div class="error-msg">识别失败，请重试</div>';
        document.getElementById('errorBanner').classList.remove('show');
      }, 3000);
    }
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // 初始：空态
  showEmptyState();
</script>
</body>
</html>
